<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programacion Web 2</title>

    <style> 
     .rectangulo {
        height: 40px;
        width: 100px;
        background-color: black;
        border: 2px solid red;

     }
     p {
        color: white;
     }

     .circulo {
        height: 100px;
        width: 100px;
        border-radius: 100%;
        background-color: cyan;
     }

     .cuadrado {
       height: 50px;
       width: 50px;
       background-color: black;
       border: 2px;
       position: relative;
       margin-top: 25px;
       margin-left: 25px;
     }

</style>
</head>
<body>
    <div class="rectangulo"> 
        <p>Rectangulo</p>
    </div>
    <div class="circulo"></div>
     <div class="cuadrado"></div>

</body>
</html>
